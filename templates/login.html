<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Pull-Up Calculator</title>
  <style>
    :root { --accent: #e74c3c; --bg: #1a1a2e; --card: #16213e; --text: #eee; --input-bg: #0f3460; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 100vh; padding: 2rem 1rem;
    }
    .card {
      background: var(--card); border-radius: 12px; padding: 2rem 2.5rem;
      box-shadow: 0 4px 24px rgba(0,0,0,.4); width: 100%; max-width: 380px;
      text-align: center;
    }
    h2 { margin-bottom: 1.2rem; font-size: 1.4rem; }
    input[type=password] {
      padding: .55rem .75rem; border: 2px solid #333; border-radius: 8px;
      background: var(--input-bg); color: #fff; font-size: 1rem; width: 100%;
      margin-bottom: 1rem;
    }
    input:focus { outline: none; border-color: var(--accent); }
    button {
      background: var(--accent); color: #fff; border: none; border-radius: 8px;
      padding: .55rem 1.6rem; font-size: 1rem; font-weight: 600; cursor: pointer;
      transition: background .2s; width: 100%;
    }
    button:hover { background: #c0392b; }
    .error { color: var(--accent); margin-bottom: 1rem; font-size: .9rem; }
    .back { margin-top: 1.2rem; }
    .back a { color: #aaa; text-decoration: none; font-size: .9rem; }
    .back a:hover { color: #fff; }
  </style>
</head>
<body>
  <div class="card">
    <h2>🔒 Timeline Login</h2>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
      <input type="password"name="password" placeholder="Password" autofocus required />
      <button type="submit">Log In</button>
    </form>
    <p class="back"><a href="/">← Back to Calculator</a></p>
  </div>
</body>
</html>
